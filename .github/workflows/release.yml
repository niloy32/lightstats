name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build LightStats.exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build single-file .exe
        shell: pwsh
        run: python build.py --no-upx

      - name: Verify output
        shell: pwsh
        run: |
          if (-not (Test-Path dist\LightStats.exe)) {
            Write-Error "dist\LightStats.exe missing — build failed"
            exit 1
          }
          $info = Get-Item dist\LightStats.exe
          Write-Host ("Built {0}  ({1:N1} MB)" -f $info.FullName, ($info.Length / 1MB))

      - name: Upload artifact (workflow_dispatch / debugging)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: LightStats-exe
          path: dist/LightStats.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LightStats.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
